version: '3.8'

services:
  # 1. PostgreSQL DB - if local database or else use online database (Mongo DB)
  db:
    image: postgres:15-alpine
    container_name: repomind_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: repomind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - repomind_net

  # 2. Qdrant Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: repomind_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - repomind_net

  # 3. Python FastAPI Backend
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: repomind_backend
    restart: always
    depends_on:
      - db
      - qdrant
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/repomind
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_IN_MEMORY=False
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REPOS_CACHE_DIR=/app/cache/repos
    volumes:
      - repos_cache:/app/cache/repos
    networks:
      - repomind_net

  # 4. Next.js 15 Frontend
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: repomind_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - repomind_net

volumes:
  postgres_data:
  qdrant_data:
  repos_cache:

networks:
  repomind_net:
    driver: bridge
